name: Build NYTHERA

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:

  # =========================
  # WINDOWS BUILD (EXE)
  # =========================
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ✅ Install MSYS2 + required native libs
      - name: Install MSYS2 and dependencies
        run: |
          choco install msys2 -y
          C:\tools\msys64\usr\bin\bash -lc "pacman -Sy --noconfirm mingw-w64-ucrt-x86_64-cairo mingw-w64-ucrt-x86_64-pango"

      # ✅ Install Python deps
      - name: Install Python deps
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      # ✅ Build EXE (no manual DLL bundling)
      - name: Build EXE
        run: |
          pyinstaller --onefile `
          --name nythera `
          nythera/cli.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: nythera-windows
          path: dist/nythera.exe

  # =========================
  # SOURCE PACKAGE (cross-platform)
  # =========================
  build-source:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create source package
        run: |
          tar -czf nythera-source.tar.gz *

      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: nythera-source
          path: nythera-source.tar.gz